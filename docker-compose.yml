version: '3.8'

services:
  # -----------------------------------
  # PostgreSQL Database
  # -----------------------------------
  db:
    image: postgres:15-alpine
    container_name: adclip_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-adclip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adclip123}
      POSTGRES_DB: ${POSTGRES_DB:-adclip_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # -----------------------------------
  # Redis (Message Broker & Cache)
  # -----------------------------------
  redis:
    image: redis:7-alpine
    container_name: adclip_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # -----------------------------------
  # FastAPI Backend
  # -----------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adclip_backend
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-adclip}:${POSTGRES_PASSWORD:-adclip123}@db:5432/${POSTGRES_DB:-adclip_db}
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend:/app
      - shared_data:/app/data

  # -----------------------------------
  # Celery Worker
  # -----------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adclip_worker
    restart: always
    command: celery -A worker.tasks.celery_app worker --loglevel=info -c 4
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-adclip}:${POSTGRES_PASSWORD:-adclip123}@db:5432/${POSTGRES_DB:-adclip_db}
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend:/app
      - shared_data:/app/data
  
  # -----------------------------------
  # Next.js Frontend
  # -----------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: adclip_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000

volumes:
  postgres_data:
  redis_data:
  shared_data: # Shared volume for uploaded videos and exported renders between backend and worker
